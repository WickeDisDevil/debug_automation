name: CodeQL

# GitHub's first-party SAST. Runs on every push to main, every PR, and
# weekly so newly-released queries also hit older code. Findings appear
# under the repo's Security → Code scanning alerts tab.
#
# Why we care:
#   This project ingests Code Scanning alerts from other repos — being
#   covered by the same scanner ourselves keeps us honest. CodeQL also
#   catches the classic Python pitfalls (sql injection, unsafe yaml
#   load, subprocess shell=True with untrusted input) that matter
#   especially for the terminal/safe_executor path.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Wednesdays at 03:00 UTC — off the daily push peak.
    - cron: "0 3 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # 'security-and-quality' is the heavier query suite — includes
          # maintainability findings alongside the default security ones.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
