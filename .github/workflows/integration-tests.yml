name: Integration tests (Phase 2 stack)

# Spins up Postgres + Qdrant as GitHub Actions services (sibling
# containers on the runner's docker network — same pattern as the
# Phase 2 devcontainer's docker-compose) and runs the integration
# test slice (`pytest -m integration`).
#
# Why opt-in:
#   The hermetic CI in `ci.yml` runs on every push. Integration tests
#   are expensive (4-container stack boot ~30 s) and only need to run
#   when memory/integrations code actually changes. So this workflow
#   triggers on:
#     * workflow_dispatch — manual button in the Actions tab.
#     * push to paths that materially affect the Phase 2 stack.
#
# Note:
#   This workflow happily passes "0 tests selected" today because no
#   tests are tagged `@pytest.mark.integration` yet. That's intentional
#   — the scaffold is here so adding the first integration test is a
#   one-line change rather than a workflow + marker registration.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bugfix_ai/memory/**"
      - "bugfix_ai/integrations/**"
      - "bugfix_ai/core/checkpointer.py"
      - "alembic/**"
      - ".github/workflows/integration-tests.yml"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bugfix
          POSTGRES_PASSWORD: bugfix
          POSTGRES_DB: bugfix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bugfix -d bugfix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      qdrant:
        image: qdrant/qdrant:v1.11.0
        ports:
          - 6333:6333

    env:
      PHASE: "2"
      ENVIRONMENT: "test"
      API_KEY: "test-key"
      GITHUB_OWNER: "test-owner"
      GITHUB_REPO: "test-repo"
      CHECKPOINTER_TYPE: "postgres"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "bugfix"
      POSTGRES_PASSWORD: "bugfix"
      POSTGRES_DB: "bugfix"
      QDRANT_URL: "http://localhost:6333"
      CATEGORIZATION_SCHEDULED_ENABLED: "false"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only Torch
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install project requirements
        run: pip install -r bugfix_ai/requirements.txt

      - name: Install dev tools
        run: pip install pytest pytest-asyncio

      - name: Run alembic migrations (if config present)
        run: |
          if [ -f bugfix_ai/alembic.ini ]; then
            (cd bugfix_ai && alembic upgrade head)
          else
            echo "no alembic.ini found, skipping migrations"
          fi

      - name: Pytest (integration marker only)
        run: pytest -q -m integration
