name: CI

# Lint + test on every push and PR to main. Kept intentionally small —
# the test suite is dependency-free (sqlite :memory: checkpointer, no
# network, no LLM, no Postgres / Qdrant), so this job runs in <2 min
# on a fresh runner.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Same defaults conftest.py pins — set here too so any script
      # imported at collection time also sees them.
      PHASE: "1"
      ENVIRONMENT: "test"
      API_KEY: "test-key"
      GITHUB_OWNER: "test-owner"
      GITHUB_REPO: "test-repo"
      CHECKPOINTER_TYPE: "sqlite"
      SQLITE_DB_PATH: ":memory:"
      CATEGORIZATION_SCHEDULED_ENABLED: "false"
      # The package source lives at repo-root/bugfix_ai/. Its pyproject's
      # packages.find is misconfigured for editable installs from this
      # layout, so we make `import bugfix_ai` resolve via PYTHONPATH instead.
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only Torch (saves ~2 GB vs the default CUDA wheel)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Install project requirements
        run: pip install -r bugfix_ai/requirements.txt

      - name: Install dev tools
        # Skip editable install: bugfix_ai/pyproject.toml's packages.find
        # is set up for a different layout. PYTHONPATH (set in env above)
        # makes `import bugfix_ai` resolve from the repo root directly.
        run: pip install ruff pytest pytest-asyncio pytest-cov

      - name: Ruff lint
        run: ruff check bugfix_ai tests scripts

      - name: Pytest (with coverage)
        # Coverage is exported as XML for tooling and as a terminal
        # summary for at-a-glance reading in the Actions log.
        # `-m "not integration"` keeps the hermetic gate hermetic —
        # the integration slice has its own workflow with the Phase 2
        # stack pre-provisioned.
        run: >-
          pytest -q
          -m "not integration"
          --cov=bugfix_ai
          --cov-report=xml:coverage.xml
          --cov-report=term

      - name: Upload coverage artifact
        # Only upload from the 3.12 leg — both legs report identical
        # numbers and uploading both just clutters the run page.
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30
