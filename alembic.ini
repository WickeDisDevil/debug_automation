[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Driver URL is loaded at runtime from settings.postgres_url; this URL is just
# a placeholder so `alembic` doesn't error when introspecting offline.
sqlalchemy.url = postgresql+asyncpg://bugfix:bugfix@localhost:5432/bugfix_ai

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
