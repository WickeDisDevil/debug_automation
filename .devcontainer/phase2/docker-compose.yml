# Phase 2 codespace stack.
#
# Mirrors `bugfix_ai/docker-compose.yml` but adds an `app` service that
# VS Code attaches to (Codespaces requires a dev container service that
# stays running with a sleep loop). Postgres / Qdrant / MLflow run as
# siblings on the default network so the app reaches them by service
# name (`postgres`, `qdrant`, `mlflow`).

services:
  app:
    image: mcr.microsoft.com/devcontainers/python:1-3.11-bookworm
    command: sleep infinity
    volumes:
      - ../..:/workspaces/${LOCAL_WORKSPACE_FOLDER_BASENAME:-bugfix-ai}:cached
    working_dir: /workspaces/${LOCAL_WORKSPACE_FOLDER_BASENAME:-bugfix-ai}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      mlflow:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bugfix
      POSTGRES_PASSWORD: bugfix
      POSTGRES_DB: bugfix
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugfix -d bugfix"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.11.0
    volumes:
      - qdrantdata:/qdrant/storage

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflowdata:/mlflow

volumes:
  pgdata:
  qdrantdata:
  mlflowdata:
